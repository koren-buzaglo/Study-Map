<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1e1e2e;color:#ddd;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:320px;min-width:320px;background:#252538;border-right:1px solid #3a3a50;display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #3a3a50;background:#1e1e2e}
.sidebar-header h1{font-size:17px;font-weight:600;color:#c4a7e7;margin-bottom:10px;letter-spacing:0.3px}
.search-box{width:100%;padding:8px 12px;border:1px solid #3a3a50;background:#1e1e2e;color:#ddd;border-radius:6px;font-size:13px;outline:none}
.search-box:focus{border-color:#c4a7e7}
.search-box::placeholder{color:#666}
.sidebar-body{flex:1;overflow-y:auto;padding:8px}
.sidebar-body::-webkit-scrollbar{width:6px}
.sidebar-body::-webkit-scrollbar-track{background:transparent}
.sidebar-body::-webkit-scrollbar-thumb{background:#3a3a50;border-radius:3px}
.section{margin-bottom:6px;border:1px solid #3a3a50;border-radius:8px;overflow:hidden;background:#1e1e2e}
.section-header{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;font-size:13px;font-weight:600;color:#c4a7e7;background:#2a2a40;transition:background 0.15s}
.section-header:hover{background:#32324a}
.section-header .chevron{font-size:10px;transition:transform 0.2s;color:#888}
.section-header.collapsed .chevron{transform:rotate(-90deg)}
.section-body{padding:12px 14px;transition:max-height 0.3s ease,padding 0.3s ease,opacity 0.2s;max-height:800px;opacity:1;overflow:hidden}
.section-body.collapsed{max-height:0;padding:0 14px;opacity:0}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:500;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid #3a3a50;background:#252538;color:#ddd;border-radius:5px;font-size:13px;outline:none;font-family:inherit}
.form-group textarea{resize:vertical;min-height:50px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#c4a7e7}
.form-group input::placeholder,.form-group textarea::placeholder{color:#555}
.btn{padding:8px 14px;border:1px solid #3a3a50;background:#2a2a40;color:#ddd;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.15s;font-family:inherit}
.btn:hover{background:#3a3a50;border-color:#c4a7e7}
.btn-primary{background:#6e5494;border-color:#7e64a4;color:#fff}
.btn-primary:hover{background:#7e64a4}
.btn-danger{border-color:#e24b4a;color:#e24b4a}
.btn-danger:hover{background:rgba(226,75,74,0.1)}
.btn-group{display:flex;gap:6px;margin-top:8px}
.btn-group .btn{flex:1}
.color-palette{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:4px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#fff}
.new-subject-form{margin-top:8px;padding-top:8px;border-top:1px solid #3a3a50}
.subject-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;margin:2px;cursor:pointer;transition:opacity 0.15s;border:1px solid rgba(255,255,255,0.1)}
.subject-pill:hover{opacity:0.8}
.subject-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.topics-list{max-height:none}
.topic-group{margin-bottom:8px}
.topic-group-header{font-size:12px;font-weight:600;padding:6px 8px;cursor:pointer;display:flex;align-items:center;gap:6px;color:#aaa;user-select:none;border-radius:4px}
.topic-group-header:hover{background:rgba(255,255,255,0.03)}
.topic-group-header .group-chevron{font-size:9px;transition:transform 0.2s}
.topic-group-header.collapsed .group-chevron{transform:rotate(-90deg)}
.topic-group-items{padding-left:8px}
.topic-group-items.collapsed{display:none}
.topic-item{padding:6px 8px;font-size:12px;cursor:pointer;border-radius:4px;display:flex;justify-content:space-between;align-items:center;transition:background 0.1s}
.topic-item:hover{background:rgba(196,167,231,0.08)}
.topic-item.selected{background:rgba(196,167,231,0.15)}
.topic-item .name{font-weight:500;color:#ddd}
.topic-item .conn-count{font-size:11px;color:#666}
.sidebar-footer{padding:10px 14px;border-top:1px solid #3a3a50;background:#1e1e2e;font-size:11px;color:#555}
.sidebar-footer .footer-btns{display:flex;gap:6px;margin-bottom:6px}
.sidebar-footer .btn{font-size:11px;padding:6px 10px}
.canvas-area{flex:1;position:relative;background:#f0f0f0;overflow:hidden}
#mainCanvas{width:100%;height:100%;cursor:grab;display:block}
#mainCanvas.grabbing{cursor:grabbing}
#mainCanvas.connecting{cursor:crosshair}
#minimap{position:absolute;bottom:16px;right:16px;width:180px;height:120px;background:#fff;border:1px solid #ccc;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.15);opacity:0.9}
#minimap:hover{opacity:1}
#minimapCanvas{width:100%;height:100%;display:block;cursor:pointer}
.toolbar{position:absolute;top:16px;right:16px;display:flex;gap:6px;z-index:5}
.toolbar .btn{background:#fff;color:#333;border:1px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,0.1);font-size:13px;padding:8px 12px;border-radius:6px}
.toolbar .btn:hover{background:#f5f5f5;border-color:#999}
.toolbar .btn.active{background:#6e5494;color:#fff;border-color:#6e5494}
.connect-indicator{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:#6e5494;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:5;display:none;box-shadow:0 2px 8px rgba(110,84,148,0.4)}
.connect-indicator.visible{display:block}
#tooltip{position:absolute;background:#252538;color:#ddd;padding:10px 14px;border-radius:8px;font-size:12px;pointer-events:none;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.3);border:1px solid #3a3a50;max-width:250px;display:none;line-height:1.5}
#tooltip .tt-name{font-weight:600;font-size:14px;color:#c4a7e7;margin-bottom:4px}
#tooltip .tt-row{display:flex;gap:6px}
#tooltip .tt-label{color:#888;min-width:70px}
#tooltip .tt-val{color:#ddd}
#tooltip .tt-notes{margin-top:6px;padding-top:6px;border-top:1px solid #3a3a50;color:#aaa;font-style:italic}
.empty-state{text-align:center;padding:20px;color:#555;font-size:13px}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.filter-chip{padding:3px 8px;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid #3a3a50;color:#888;transition:all 0.15s;user-select:none}
.filter-chip:hover{border-color:#666}
.filter-chip.active{background:#6e5494;border-color:#7e64a4;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Study Map</h1>
      <input type="text" class="search-box" id="searchInput" placeholder="Search topics...">
    </div>
    <div class="sidebar-body">

      <div class="section">
        <div class="section-header" id="addTopicHeader">
          <span>+ Add topic</span><span class="chevron">&#9660;</span>
        </div>
        <div class="section-body" id="addTopicBody">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="addName" placeholder="e.g., Real Numbers">
          </div>
          <div class="form-group">
            <label>Subject</label>
            <select id="addSubject"><option value="">Choose subject...</option><option value="__new__">+ Create new subject</option></select>
          </div>
          <div id="newSubjectArea" style="display:none" class="new-subject-form">
            <div class="form-group">
              <label>New subject name</label>
              <input type="text" id="newSubjectName" placeholder="e.g., Linear Algebra">
            </div>
            <div class="form-group">
              <label>Color</label>
              <div class="color-palette" id="colorPalette"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <select id="addDifficulty">
              <option value="beginner">Beginner (circle)</option>
              <option value="intermediate" selected>Intermediate (square)</option>
              <option value="advanced">Advanced (triangle)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Importance</label>
            <select id="addImportance">
              <option value="core" selected>Core</option>
              <option value="supplementary">Supplementary</option>
              <option value="optional">Optional</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date learned</label>
            <input type="date" id="addDate">
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="addNotes" placeholder="Any notes about this topic..."></textarea>
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="addNode()">Add topic</button>
        </div>
      </div>

      <div class="section" id="editSection" style="display:none">
        <div class="section-header" style="cursor:default">
          <span>Edit topic</span><span class="chevron" style="visibility:hidden">&#9660;</span>
        </div>
        <div class="section-body">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="editName">
          </div>
          <div class="form-group">
            <label>Subject</label>
            <select id="editSubject"></select>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <select id="editDifficulty">
              <option value="beginner">Beginner (circle)</option>
              <option value="intermediate">Intermediate (square)</option>
              <option value="advanced">Advanced (triangle)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Importance</label>
            <select id="editImportance">
              <option value="core">Core</option>
              <option value="supplementary">Supplementary</option>
              <option value="optional">Optional</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date learned</label>
            <input type="date" id="editDate">
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="editNotes"></textarea>
          </div>
          <div class="btn-group">
           <button class="btn btn-primary" onclick="saveEdit()">Save</button>
          <button class="btn" onclick="cancelEdit()">Cancel</button>
          </div>
          <button class="btn btn-danger" style="width:100%;margin-top:8px" onclick="deleteSelectedNode()">Delete topic</button>
      </div>
    </div>

      <div class="section">
        <div class="section-header" id="subjectsHeader">
          <span>Subjects</span><span class="chevron">&#9660;</span>
        </div>
        <div class="section-body" id="subjectsBody">
          <div id="subjectsList"></div>
            <div id="editSubjectArea" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #3a3a50">
        <div class="form-group">
        <label>Subject name</label>
        <input type="text" id="editSubjectName">
        </div>
        <div class="form-group">
        <label>Color</label>
        <div class="color-palette" id="editColorPalette"></div>
        </div>
        <div class="btn-group">
        <button class="btn btn-primary" onclick="saveSubjectEdit()">Save</button>
        <button class="btn" onclick="cancelSubjectEdit()">Cancel</button>
      </div>
      <button class="btn btn-danger" style="width:100%;margin-top:8px" onclick="deleteSubject()">Delete subject</button>
      </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header" id="filtersHeader">
          <span>Filters</span><span class="chevron">&#9660;</span>
        </div>
        <div class="section-body" id="filtersBody">
          <div class="form-group">
            <label>Subject</label>
            <div class="filter-chips" id="filterSubjectChips"></div>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <div class="filter-chips" id="filterDifficultyChips"></div>
          </div>
          <div class="form-group">
            <label>Importance</label>
            <div class="filter-chips" id="filterImportanceChips"></div>
          </div>
          <button class="btn" style="width:100%;margin-top:4px" onclick="clearFilters()">Clear all filters</button>
        </div>
      </div>

      <div class="section" style="flex:1;display:flex;flex-direction:column">
        <div class="section-header" style="cursor:default">
          <span>Topics (<span id="topicCount">0</span>)</span><span class="chevron" style="visibility:hidden">&#9660;</span>
        </div>
        <div class="section-body topics-list" id="topicsList" style="overflow-y:auto;max-height:300px"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="footer-btns">
        <button class="btn" onclick="exportJSON()">Export JSON</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <canvas id="mainCanvas"></canvas>
    <div class="toolbar">
      <button class="btn" id="connectModeBtn" onclick="toggleConnectMode()">Connect</button>
      <button class="btn" id="undoBtn" onclick="undo()" title="Ctrl+Z">Undo</button>
      <button class="btn" onclick="zoomIn()">+</button>
      <button class="btn" onclick="zoomOut()">-</button>
      <button class="btn" onclick="resetView()">Reset view</button>
    </div>
    <div class="connect-indicator" id="connectIndicator">Click two nodes to connect them</div>
    <div id="tooltip"></div>
    <div id="minimap"><canvas id="minimapCanvas"></canvas></div>
  </div>
</div>

<script>
const COLORS = ['#378ADD','#639922','#BA7517','#D4537E','#1D9E75','#D85A30','#7F77DD','#E24B4A','#5DCAA5','#F0997B','#85B7EB','#E8A838'];
const NODE_RADIUS_MIN = 22;
const NODE_RADIUS_MAX = 55;

// ===== LOGGING UTILITY =====
// Centralized logging function for debugging all operations
function log(level, message, data) {
    const timestamp = new Date().toISOString();
    const prefix = '[' + timestamp + '] [' + level + ']';
    if (data !== undefined) {
        console.log(prefix, message, data);
    } else {
        console.log(prefix, message);
    }
}

// ===== STATE VARIABLES =====
let nodes = [];
let connections = [];
let subjects = [];
let panX = 0, panY = 0, zoom = 1;
let selectedNodeId = null;
let hoveredNodeId = null;
let hoveredConnId = null;
let connectMode = false;
let connectFromId = null;
let draggingNode = null;
let dragStartX = 0, dragStartY = 0;
let isPanning = false;
let panStartX = 0, panStartY = 0;
let panStartPanX = 0, panStartPanY = 0;
let undoStack = [];
let searchQuery = '';
let filters = { subjects: [], difficulties: [], importances: [] };
let selectedNewColor = COLORS[0];
let editingSubject = null;
let editSubjectColor = null;
let animFrame = null;

const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// ===== INITIALIZATION =====
// Initialize the application: set up canvas, load data, attach event listeners
function init() {
  log('INFO', 'Initializing Study Map application');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  loadFromStorage();
  buildColorPalette();
  refreshSubjectDropdowns();
  refreshFilters();
  refreshTopicsList();
  render();

  mainCanvas.addEventListener('mousedown', onCanvasMouseDown);
  mainCanvas.addEventListener('mousemove', onCanvasMouseMove);
  mainCanvas.addEventListener('mouseup', onCanvasMouseUp);
  mainCanvas.addEventListener('mouseleave', onCanvasMouseLeave);
  mainCanvas.addEventListener('wheel', onCanvasWheel, { passive: false });
  mainCanvas.addEventListener('dblclick', onCanvasDblClick);
  mmCanvas.addEventListener('click', onMinimapClick);

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'Escape') { cancelEdit(); if (connectMode) toggleConnectMode(); }
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    refreshTopicsList();
    render();
  });

  document.getElementById('addSubject').addEventListener('change', e => {
    document.getElementById('newSubjectArea').style.display = e.target.value === '__new__' ? 'block' : 'none';
  });

  setupCollapsible('addTopicHeader', 'addTopicBody');
  setupCollapsible('subjectsHeader', 'subjectsBody');
  setupCollapsible('filtersHeader', 'filtersBody');
  
  log('INFO', 'Application initialization complete');
}

// Set up collapsible sections by toggling CSS classes
function setupCollapsible(headerId, bodyId) {
  log('INFO', 'Setting up collapsible section: ' + headerId);
  const header = document.getElementById(headerId);
  const body = document.getElementById(bodyId);
  header.addEventListener('click', () => {
    header.classList.toggle('collapsed');
    body.classList.toggle('collapsed');
  });
}

// ===== CANVAS MANAGEMENT =====
// Resize canvas to fit available space and trigger re-render
function resizeCanvas() {
  log('INFO', 'Resizing canvas');
  const area = document.querySelector('.canvas-area');
  mainCanvas.width = area.clientWidth;
  mainCanvas.height = area.clientHeight;
  mmCanvas.width = 180;
  mmCanvas.height = 120;
  render();
}

// Convert screen coordinates to world coordinates
function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

// Convert world coordinates to screen coordinates
function worldToScreen(wx, wy) {
  return { x: wx * zoom + panX, y: wy * zoom + panY };
}

// ===== UTILITY FUNCTIONS =====
// Generate unique ID for nodes and connections
function generateId() {
  return 'n' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// Add action to undo stack (max 50 actions)
function pushUndo(action) {
  log('INFO', 'Pushing undo action: ' + action.type);
  undoStack.push(action);
  if (undoStack.length > 50) undoStack.shift();
}

// Calculate node radius based on text width
function getNodeRadius(node) {
    ctx.font = '12px -apple-system, sans-serif';
    const textWidth = ctx.measureText(node.name).width;
    return Math.max(NODE_RADIUS_MIN, Math.min(NODE_RADIUS_MAX, textWidth / 2 + 12));
}

// Get color assigned to a subject
function getSubjectColor(subjectName) {
  const s = subjects.find(s => s.name === subjectName);
  return s ? s.color : '#888';
}

// Count connections for a specific node
function getConnectionCount(nodeId) {
  return connections.filter(c => c.from === nodeId || c.to === nodeId).length;
}

// ===== NODE AND CONNECTION SELECTION =====
// Get node at world coordinates (checks from top to bottom)
function getNodeAt(wx, wy) {
    log('INFO', 'Checking for node at world position: ' + wx + ', ' + wy);
    for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        const r = getNodeRadius(n);
        const dx = wx - n.x, dy = wy - n.y;
        if (Math.sqrt(dx * dx + dy * dy) < r + 4) {
          log('INFO', 'Found node: ' + n.name);
          return n;
        }
    }
    return null;
}

// Get connection at world coordinates (checks distance to line)
function getConnectionAt(wx, wy) {
  log('INFO', 'Checking for connection at world position: ' + wx + ', ' + wy);
  for (const c of connections) {
    const from = nodes.find(n => n.id === c.from);
    const to = nodes.find(n => n.id === c.to);
    if (!from || !to) continue;
    const dist = pointToSegmentDist(wx, wy, from.x, from.y, to.x, to.y);
    if (dist < 6 / zoom) {
      log('INFO', 'Found connection');
      return c;
    }
  }
  return null;
}

// Calculate distance from point to line segment
function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const projX = x1 + t * dx, projY = y1 + t * dy;
  return Math.sqrt((px - projX) ** 2 + (py - projY) ** 2);
}

// ===== UNDO FUNCTIONALITY =====
// Undo the last action by popping from undo stack
function undo() {
  log('INFO', 'Executing undo');
  if (undoStack.length === 0) {
    log('WARN', 'Undo stack is empty');
    return;
  }
  const action = undoStack.pop();
  log('INFO', 'Undoing action: ' + action.type);

  if (action.type === 'addNode') {
    nodes = nodes.filter(n => n.id !== action.nodeId);
    connections = connections.filter(c => c.from !== action.nodeId && c.to !== action.nodeId);
    if (selectedNodeId === action.nodeId) cancelEdit();
    if (action.newSubject) {
      subjects = subjects.filter(s => s.name !== action.newSubject.name);
      refreshSubjectDropdowns();
      refreshFilters();
    }
  } else if (action.type === 'moveNode') {
    const node = nodes.find(n => n.id === action.nodeId);
    if (node) { node.x = action.oldX; node.y = action.oldY; }
  } else if (action.type === 'editNode') {
    const node = nodes.find(n => n.id === action.nodeId);
    if (node) Object.assign(node, action.oldData);
  } else if (action.type === 'addConnection') {
    connections = connections.filter(c => c.id !== action.connId);
    } else if (action.type === 'deleteNode') {
    nodes.push(action.node);
    action.connections.forEach(c => connections.push(c));
    refreshSubjectDropdowns();
  } else if (action.type === 'deleteConnection') {
    connections.push(action.conn);
  } else if (action.type === 'editSubject') {
    const s = subjects.find(x => x.name === action.newName);
    if (s) {
        s.name = action.oldName;
        s.color = action.oldColor;
        nodes.forEach(n => { if (n.subject === action.newName) n.subject = action.oldName; });
        filters.subjects = filters.subjects.map(f => f === action.newName ? action.oldName : f);
    }
    refreshSubjectDropdowns();
    refreshFilters();
  } else if (action.type === 'deleteSubject') {
    subjects.push(action.subject);
    action.nodes.forEach(n => nodes.push(n));
    action.connections.forEach(c => connections.push(c));
    refreshSubjectDropdowns();
    refreshFilters();
  } else if (action.type === 'clearAll') {
    nodes = action.oldNodes;
    connections = action.oldConnections;
    subjects = action.oldSubjects;
    refreshSubjectDropdowns();
    refreshFilters();
  }
  save();
  refreshTopicsList();
  render();
}

// ===== FILTERING =====
// Check if node is visible based on current filters and search
function isNodeVisible(node) {
  if (searchQuery && !node.name.toLowerCase().includes(searchQuery)) return false;
  if (filters.subjects.length > 0 && !filters.subjects.includes(node.subject)) return false;
  if (filters.difficulties.length > 0 && !filters.difficulties.includes(node.difficulty)) return false;
  if (filters.importances.length > 0 && !filters.importances.includes(node.importance)) return false;
  return true;
}

// ===== RENDERING =====
// Draw a single node with appropriate shape and styling
function drawNode(node, highlight) {
  const color = getSubjectColor(node.subject);
  const visible = isNodeVisible(node);
  const alpha = visible ? 1 : 0.15;
  const r = getNodeRadius(node);;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = highlight ? '#fff' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = highlight ? 3 / zoom : 1.5 / zoom;

  // Draw shape based on difficulty: circle (beginner), square (intermediate), triangle (advanced)
  if (node.difficulty === 'beginner') {
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (node.difficulty === 'advanced') {
    ctx.beginPath();
    ctx.moveTo(node.x, node.y - r - 2);
    ctx.lineTo(node.x + r + 2, node.y + r * 0.6);
    ctx.lineTo(node.x - r - 2, node.y + r * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    const hw = r + 2, hh = r - 2;
    ctx.beginPath();
    ctx.moveTo(node.x - hw + 4, node.y - hh);
    ctx.lineTo(node.x + hw - 4, node.y - hh);
    ctx.quadraticCurveTo(node.x + hw, node.y - hh, node.x + hw, node.y - hh + 4);
    ctx.lineTo(node.x + hw, node.y + hh - 4);
    ctx.quadraticCurveTo(node.x + hw, node.y + hh, node.x + hw - 4, node.y + hh);
    ctx.lineTo(node.x - hw + 4, node.y + hh);
    ctx.quadraticCurveTo(node.x - hw, node.y + hh, node.x - hw, node.y + hh - 4);
    ctx.lineTo(node.x - hw, node.y - hh + 4);
    ctx.quadraticCurveTo(node.x - hw, node.y - hh, node.x - hw + 4, node.y - hh);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Add highlight glow if selected/hovered
  if (highlight) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.globalAlpha = alpha * 0.4;
    if (node.difficulty === 'beginner') {
      ctx.beginPath(); ctx.arc(node.x, node.y, r + 4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // Draw text label
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = `${Math.max(10, 12 / Math.max(zoom, 0.5))}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const displayName = node.name;
  const textY = node.difficulty === 'advanced' ? node.y + 2 : node.y;
  ctx.fillText(displayName, node.x, textY);

  ctx.restore();
}

// Draw a connection (line with arrow) between two nodes
function drawConnection(conn, highlight) {
  const from = nodes.find(n => n.id === conn.from);
  const to = nodes.find(n => n.id === conn.to);
  if (!from || !to) return;

  const bothVisible = isNodeVisible(from) && isNodeVisible(to);
  const alpha = bothVisible ? (highlight ? 0.8 : 0.35) : 0.08;

  const dx = to.x - from.x, dy = to.y - from.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return;
  const ux = dx / dist, uy = dy / dist;
  const fromR = getNodeRadius(from);
  const toR = getNodeRadius(to);
  const startX = from.x + ux * fromR;
  const startY = from.y + uy * fromR;
  const endX = to.x - ux * (toR + 8);
  const endY = to.y - uy * (toR + 8);
  
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = highlight ? '#c4a7e7' : '#888';
  ctx.lineWidth = highlight ? 2.5 / zoom : 1.5 / zoom;
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // Draw arrowhead at end of connection
  const arrowLen = 10 / zoom;
  const arrowAngle = Math.atan2(endY - startY, endX - startX);
  ctx.fillStyle = highlight ? '#c4a7e7' : '#888';
  ctx.beginPath();
  ctx.moveTo(endX + Math.cos(arrowAngle) * arrowLen, endY + Math.sin(arrowAngle) * arrowLen);
  ctx.lineTo(endX + Math.cos(arrowAngle - 0.5) * arrowLen, endY + Math.sin(arrowAngle - 0.5) * arrowLen);
  ctx.lineTo(endX + Math.cos(arrowAngle + 0.5) * arrowLen, endY + Math.sin(arrowAngle + 0.5) * arrowLen);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// Draw background grid for visual reference
function drawGrid() {
  const gridSize = 50;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  ctx.lineWidth = 1;

  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(mainCanvas.width, mainCanvas.height);
  const startX = Math.floor(topLeft.x / gridSize) * gridSize;
  const startY = Math.floor(topLeft.y / gridSize) * gridSize;

  for (let x = startX; x < bottomRight.x; x += gridSize) {
    const sx = x * zoom + panX;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, mainCanvas.height); ctx.stroke();
  }
  for (let y = startY; y < bottomRight.y; y += gridSize) {
    const sy = y * zoom + panY;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(mainCanvas.width, sy); ctx.stroke();
  }
  ctx.restore();
}

// Main render function - called whenever view needs updating
function render() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => {
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    ctx.fillStyle = '#f5f5f0';
    ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
    drawGrid();

    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    // Draw connections first so they appear behind nodes
    connections.forEach(c => {
      const hl = hoveredConnId === c.id || (hoveredNodeId && (c.from === hoveredNodeId || c.to === hoveredNodeId));
      drawConnection(c, hl);
    });

    // Draw nodes on top
    nodes.forEach(n => {
      const hl = n.id === selectedNodeId || n.id === hoveredNodeId || n.id === connectFromId;
      drawNode(n, hl);
    });

    ctx.restore();
    renderMinimap();
  });
}

// Render minimap showing overall view
function renderMinimap() {
  log('INFO', 'Rendering minimap');
  mmCtx.clearRect(0, 0, 180, 120);
  mmCtx.fillStyle = '#fafafa';
  mmCtx.fillRect(0, 0, 180, 120);

  if (nodes.length === 0) return;

  // Calculate world bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x - 30 < minX) minX = n.x - 30;
    if (n.y - 30 < minY) minY = n.y - 30;
    if (n.x + 30 > maxX) maxX = n.x + 30;
    if (n.y + 30 > maxY) maxY = n.y + 30;
  });

  const padding = 60;
  minX -= padding; minY -= padding; maxX += padding; maxY += padding;
  const worldW = maxX - minX || 1;
  const worldH = maxY - minY || 1;
  const scale = Math.min(170 / worldW, 110 / worldH);
  const offX = (180 - worldW * scale) / 2;
  const offY = (120 - worldH * scale) / 2;

  // Draw connections on minimap
  connections.forEach(c => {
    const from = nodes.find(n => n.id === c.from);
    const to = nodes.find(n => n.id === c.to);
    if (!from || !to) return;
    mmCtx.strokeStyle = 'rgba(0,0,0,0.1)';
    mmCtx.lineWidth = 0.5;
    mmCtx.beginPath();
    mmCtx.moveTo((from.x - minX) * scale + offX, (from.y - minY) * scale + offY);
    mmCtx.lineTo((to.x - minX) * scale + offX, (to.y - minY) * scale + offY);
    mmCtx.stroke();
  });

  // Draw nodes on minimap
  nodes.forEach(n => {
    const sx = (n.x - minX) * scale + offX;
    const sy = (n.y - minY) * scale + offY;
    mmCtx.fillStyle = isNodeVisible(n) ? getSubjectColor(n.subject) : '#ccc';
    mmCtx.beginPath();
    mmCtx.arc(sx, sy, 3, 0, Math.PI * 2);
    mmCtx.fill();
  });

  // Draw viewport rectangle
  const vpTopLeft = screenToWorld(0, 0);
  const vpBottomRight = screenToWorld(mainCanvas.width, mainCanvas.height);
  const vx = (vpTopLeft.x - minX) * scale + offX;
  const vy = (vpTopLeft.y - minY) * scale + offY;
  const vw = (vpBottomRight.x - vpTopLeft.x) * scale;
  const vh = (vpBottomRight.y - vpTopLeft.y) * scale;
  mmCtx.strokeStyle = '#6e5494';
  mmCtx.lineWidth = 1.5;
  mmCtx.strokeRect(vx, vy, vw, vh);

  mainCanvas._mmData = { minX, minY, scale, offX, offY };
}

// Show tooltip when hovering over node
function showTooltip(clientX, clientY, node) {
  const subjectColor = getSubjectColor(node.subject);
  const connCount = getConnectionCount(node.id);
  let html = `<div class="tt-name" style="color:${subjectColor}">${node.name}</div>`;
  html += `<div class="tt-row"><span class="tt-label">Subject</span><span class="tt-val">${node.subject}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Difficulty</span><span class="tt-val">${node.difficulty}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Importance</span><span class="tt-val">${node.importance}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Learned</span><span class="tt-val">${node.dateLearned || 'Not set'}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Connections</span><span class="tt-val">${connCount}</span></div>`;
  if (node.notes) html += `<div class="tt-notes">${node.notes}</div>`;

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  const canvasRect = document.querySelector('.canvas-area').getBoundingClientRect();
  let tx = clientX - canvasRect.left + 16;
  let ty = clientY - canvasRect.top - 10;
  if (tx + 260 > canvasRect.width) tx = clientX - canvasRect.left - 260;
  if (ty + 160 > canvasRect.height) ty = clientY - canvasRect.top - 160;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

// ===== CANVAS MOUSE EVENTS =====
// Handle mouse down - start dragging, panning, or connection mode
function onCanvasMouseDown(e) {
  log('INFO', 'Canvas mouse down at screen: ' + e.clientX + ', ' + e.clientY);
  const rect = mainCanvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);
  const node = getNodeAt(world.x, world.y);

  // Connection mode: select two nodes to connect
  if (connectMode && node) {
    if (!connectFromId) {
      connectFromId = node.id;
      document.getElementById('connectIndicator').textContent = `Click second node to connect from "${node.name}"`;
      render();
    } else if (connectFromId !== node.id) {
      const existing = connections.find(c =>
        (c.from === connectFromId && c.to === node.id) || (c.from === node.id && c.to === connectFromId)
      );
      if (!existing) {
        const conn = { id: generateId(), from: connectFromId, to: node.id };
        connections.push(conn);
        pushUndo({ type: 'addConnection', connId: conn.id });
        save();
        refreshTopicsList();
      }
      connectFromId = null;
      document.getElementById('connectIndicator').textContent = 'Click two nodes to connect them';
      render();
    }
    return;
  }

  // Normal mode: drag node
  if (node && !connectMode) {
    draggingNode = node;
    dragStartX = node.x;
    dragStartY = node.y;
    mainCanvas.classList.add('grabbing');
    return;
  }

  // Delete connection if clicked on it
  const conn = getConnectionAt(world.x, world.y);
  if (conn) {
    log('INFO', 'Deleting connection');
    pushUndo({ type: 'deleteConnection', conn: { ...conn } });
    connections = connections.filter(c => c.id !== conn.id);
    hoveredConnId = null;
    save();
    refreshTopicsList();
    render();
    return;
  }

  // Default: start panning canvas
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panStartPanX = panX;
  panStartPanY = panY;
  mainCanvas.classList.add('grabbing');
}

// Handle mouse move - update hover state and dragging
function onCanvasMouseMove(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);

  // Dragging node
  if (draggingNode) {
    draggingNode.x = world.x;
    draggingNode.y = world.y;
    render();
    return;
  }

  // Panning canvas
  if (isPanning) {
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    render();
    return;
  }

  // Update hover state
  const node = getNodeAt(world.x, world.y);
  const prevHovered = hoveredNodeId;
  hoveredNodeId = node ? node.id : null;

  if (!node) {
    const conn = getConnectionAt(world.x, world.y);
    hoveredConnId = conn ? conn.id : null;
  } else {
    hoveredConnId = null;
  }

  // Show tooltip and update cursor
  if (node) {
    showTooltip(e.clientX, e.clientY, node);
    mainCanvas.classList.add(connectMode ? 'connecting' : '');
    mainCanvas.style.cursor = connectMode ? 'crosshair' : 'pointer';
  } else if (hoveredConnId) {
    tooltip.style.display = 'none';
    mainCanvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    mainCanvas.style.cursor = connectMode ? 'crosshair' : 'grab';
  }

  if (prevHovered !== hoveredNodeId || hoveredConnId !== null) render();
}

// Handle mouse up - finish dragging or record node move in undo
function onCanvasMouseUp(e) {
  log('INFO', 'Canvas mouse up');
  if (draggingNode) {
    const movedX = Math.abs(draggingNode.x - dragStartX);
    const movedY = Math.abs(draggingNode.y - dragStartY);
    if (movedX > 2 || movedY > 2) {
      log('INFO', 'Node moved, recording in undo');
      pushUndo({ type: 'moveNode', nodeId: draggingNode.id, oldX: dragStartX, oldY: dragStartY });
      save();
    } else {
      selectNode(draggingNode.id);
    }
    draggingNode = null;
    mainCanvas.classList.remove('grabbing');
    render();
    return;
  }

  if (isPanning) {
    isPanning = false;
    mainCanvas.classList.remove('grabbing');
  }
}

// Handle mouse leave canvas
function onCanvasMouseLeave() {
  tooltip.style.display = 'none';
  hoveredNodeId = null;
  hoveredConnId = null;
  if (isPanning) { isPanning = false; mainCanvas.classList.remove('grabbing'); }
  render();
}

// Handle mouse wheel - zoom in/out
function onCanvasWheel(e) {
  log('INFO', 'Canvas wheel zoom');
  e.preventDefault();
  const rect = mainCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.1, Math.min(5, zoom * delta));
  panX = mx - (mx - panX) * (zoom / oldZoom);
  panY = my - (my - panY) * (zoom / oldZoom);
  render();
}

// Handle double click - select node
function onCanvasDblClick(e) {
  log('INFO', 'Canvas double click');
  const rect = mainCanvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);
  const node = getNodeAt(world.x, world.y);
  if (node) selectNode(node.id);
}

// Handle minimap click - jump to location
function onMinimapClick(e) {
  log('INFO', 'Minimap clicked');
  if (!mainCanvas._mmData || nodes.length === 0) return;
  const rect = mmCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { minX, minY, scale, offX, offY } = mainCanvas._mmData;
  const worldX = (mx - offX) / scale + minX;
  const worldY = (my - offY) / scale + minY;
  panX = mainCanvas.width / 2 - worldX * zoom;
  panY = mainCanvas.height / 2 - worldY * zoom;
  render();
}

// ===== NODE OPERATIONS =====
// Select node and show edit panel
function selectNode(nodeId) {
  log('INFO', 'Selecting node: ' + nodeId);
  selectedNodeId = nodeId;
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;

  document.getElementById('editSection').style.display = 'block';
  document.getElementById('editName').value = node.name;
  refreshEditSubjectDropdown(node.subject);
  document.getElementById('editDifficulty').value = node.difficulty;
  document.getElementById('editImportance').value = node.importance;
  document.getElementById('editDate').value = node.dateLearned || '';
  document.getElementById('editNotes').value = node.notes || '';
  render();
}

// Refresh subject dropdown for editing
function refreshEditSubjectDropdown(current) {
  log('INFO', 'Refreshing edit subject dropdown');
  const sel = document.getElementById('editSubject');
  sel.innerHTML = '';
  subjects.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name;
    if (s.name === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

// Add new node to canvas
function addNode() {
  log('INFO', 'Adding new node');
  const name = document.getElementById('addName').value.trim();
  let subject = document.getElementById('addSubject').value;

  // Validate name FIRST before creating any subject
  if (!name) { alert('Please enter a topic name'); return; }
  if (!subject) { alert('Please choose a subject'); return; }

  let newSubjectAdded = null;
  if (subject === '__new__') {
    const newName = document.getElementById('newSubjectName').value.trim();
    if (!newName) { alert('Please enter a subject name'); return; }
    if (!subjects.find(s => s.name === newName)) {
      newSubjectAdded = { name: newName, color: selectedNewColor };
      subjects.push(newSubjectAdded);
      refreshSubjectDropdowns();
      refreshFilters();
    }
    subject = newName;
    document.getElementById('newSubjectName').value = '';
    document.getElementById('newSubjectArea').style.display = 'none';
  }

  const centerWorld = screenToWorld(mainCanvas.width / 2, mainCanvas.height / 2);
  const node = {
    id: generateId(),
    name,
    subject,
    difficulty: document.getElementById('addDifficulty').value,
    importance: document.getElementById('addImportance').value,
    dateLearned: document.getElementById('addDate').value,
    notes: document.getElementById('addNotes').value,
    x: centerWorld.x + (Math.random() - 0.5) * 200,
    y: centerWorld.y + (Math.random() - 0.5) * 200,
  };

  nodes.push(node);
  pushUndo({ type: 'addNode', nodeId: node.id, newSubject: newSubjectAdded });
  save();

  document.getElementById('addName').value = '';
  document.getElementById('addNotes').value = '';
  document.getElementById('addDate').value = '';
  document.getElementById('addSubject').value = '';

  refreshTopicsList();
  render();
}

// Save edited node
function saveEdit() {
  log('INFO', 'Saving node edit');
  const node = nodes.find(n => n.id === selectedNodeId);
  if (!node) return;

  const oldData = { name: node.name, subject: node.subject, difficulty: node.difficulty, importance: node.importance, dateLearned: node.dateLearned, notes: node.notes };

  node.name = document.getElementById('editName').value.trim() || node.name;
  node.subject = document.getElementById('editSubject').value;
  node.difficulty = document.getElementById('editDifficulty').value;
  node.importance = document.getElementById('editImportance').value;
  node.dateLearned = document.getElementById('editDate').value;
  node.notes = document.getElementById('editNotes').value;

  pushUndo({ type: 'editNode', nodeId: node.id, oldData });
  save();
  refreshTopicsList();
  render();
  document.getElementById('editSection').style.display = 'none';
  selectedNodeId = null;
}

// Cancel editing node
function cancelEdit() {
  log('INFO', 'Canceling node edit');
  selectedNodeId = null;
  document.getElementById('editSection').style.display = 'none';
  render();
}

// Delete selected node
function deleteSelectedNode() {
  log('INFO', 'Deleting selected node');
  if (!selectedNodeId) return;
  const node = nodes.find(n => n.id === selectedNodeId);
  if (!node) return;
  if (!confirm('Delete "' + node.name + '" and all its connections?')) return;

  const removedConns = connections.filter(c => c.from === node.id || c.to === node.id);
  pushUndo({ type: 'deleteNode', node: { ...node }, connections: removedConns.map(c => ({ ...c })) });

  nodes = nodes.filter(n => n.id !== node.id);
  connections = connections.filter(c => c.from !== node.id && c.to !== node.id);
  selectedNodeId = null;
  document.getElementById('editSection').style.display = 'none';
  save();
  refreshSubjectDropdowns();
  refreshTopicsList();
  render();
}

// ===== VIEW OPERATIONS =====
// Toggle connection mode
function toggleConnectMode() {
  log('INFO', 'Toggling connect mode');
  connectMode = !connectMode;
  connectFromId = null;
  const btn = document.getElementById('connectModeBtn');
  const indicator = document.getElementById('connectIndicator');
  btn.classList.toggle('active', connectMode);
  indicator.classList.toggle('visible', connectMode);
  indicator.textContent = 'Click two nodes to connect them';
  mainCanvas.style.cursor = connectMode ? 'crosshair' : 'grab';
  render();
}

// Zoom in
function zoomIn() {
  log('INFO', 'Zoom in');
  zoom = Math.min(5, zoom * 1.2);
  render();
}

// Zoom out
function zoomOut() {
  log('INFO', 'Zoom out');
  zoom = Math.max(0.1, zoom / 1.2);
  render();
}

// Reset view to fit all nodes
function resetView() {
  log('INFO', 'Resetting view to fit all nodes');
  if (nodes.length === 0) { panX = 0; panY = 0; zoom = 1; render(); return; }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => { minX = Math.min(minX, n.x); minY = Math.min(minY, n.y); maxX = Math.max(maxX, n.x); maxY = Math.max(maxY, n.y); });
  const worldW = maxX - minX + 100;
  const worldH = maxY - minY + 100;
  zoom = Math.min(mainCanvas.width / worldW, mainCanvas.height / worldH, 2);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  panX = mainCanvas.width / 2 - cx * zoom;
  panY = mainCanvas.height / 2 - cy * zoom;
  render();
}

// ===== SUBJECT OPERATIONS =====
// Build color palette for subject selection
function buildColorPalette() {
  log('INFO', 'Building color palette');
  const palette = document.getElementById('colorPalette');
  palette.innerHTML = '';
  COLORS.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (c === selectedNewColor ? ' selected' : '');
    swatch.style.background = c;
    swatch.onclick = () => {
      selectedNewColor = c;
      palette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
    };
    palette.appendChild(swatch);
  });
}

// Refresh subject dropdowns in UI
function refreshSubjectDropdowns() {
  log('INFO', 'Refreshing subject dropdowns');
  const addSel = document.getElementById('addSubject');
  const currentVal = addSel.value;
  addSel.innerHTML = '<option value="">Choose subject...</option><option value="__new__">+ Create new subject</option>';
  subjects.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name;
    addSel.appendChild(opt);
  });
  if (currentVal && currentVal !== '__new__') addSel.value = currentVal;

  const subjectsList = document.getElementById('subjectsList');
  subjectsList.innerHTML = '';
  if (subjects.length === 0) {
    subjectsList.innerHTML = '<div class="empty-state">No subjects yet</div>';
    return;
  }
  subjects.forEach(s => {
    const count = nodes.filter(n => n.subject === s.name).length;
    const pill = document.createElement('span');
    pill.className = 'subject-pill';
    pill.style.background = s.color + '22';
    pill.style.color = s.color;
    pill.style.borderColor = s.color + '44';
    pill.innerHTML = `<span class="dot" style="background:${s.color}"></span>${s.name} (${count})`;
    pill.onclick = () => {
      openSubjectEdit(s.name);
    };
    subjectsList.appendChild(pill);
  });
}

// Open subject edit panel
function openSubjectEdit(subjectName) {
    log('INFO', 'Opening subject edit for: ' + subjectName);
    const s = subjects.find(x => x.name === subjectName);
    if (!s) return;
    editingSubject = subjectName;
    editSubjectColor = s.color;
    document.getElementById('editSubjectName').value = s.name;
    document.getElementById('editSubjectArea').style.display = 'block';
    buildEditColorPalette();
}

// Build color palette for subject editing
function buildEditColorPalette() {
    log('INFO', 'Building edit color palette');
    const palette = document.getElementById('editColorPalette');
    palette.innerHTML = '';
    COLORS.forEach(c => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch' + (c === editSubjectColor ? ' selected' : '');
        swatch.style.background = c;
        swatch.onclick = () => {
            editSubjectColor = c;
            palette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
            swatch.classList.add('selected');
        };
        palette.appendChild(swatch);
    });
}

// Save subject edit
function saveSubjectEdit() {
    log('INFO', 'Saving subject edit');
    if (!editingSubject) return;
    const newName = document.getElementById('editSubjectName').value.trim();
    if (!newName) { alert('Subject name cannot be empty'); return; }

    const s = subjects.find(x => x.name === editingSubject);
    if (!s) return;

    const oldName = s.name;
    const oldColor = s.color;

    pushUndo({ type: 'editSubject', oldName: oldName, oldColor: oldColor, newName: newName, newColor: editSubjectColor });

    s.name = newName;
    s.color = editSubjectColor;

    if (oldName !== newName) {
        nodes.forEach(n => { if (n.subject === oldName) n.subject = newName; });
        filters.subjects = filters.subjects.map(f => f === oldName ? newName : f);
    }

    editingSubject = null;
    document.getElementById('editSubjectArea').style.display = 'none';
    save();
    refreshSubjectDropdowns();
    refreshFilters();
    refreshTopicsList();
    render();
}

// Cancel subject edit
function cancelSubjectEdit() {
    log('INFO', 'Canceling subject edit');
    editingSubject = null;
    document.getElementById('editSubjectArea').style.display = 'none';
}

// Delete subject and all related nodes
function deleteSubject() {
    log('INFO', 'Deleting subject: ' + editingSubject);
    if (!editingSubject) return;
    const topicCount = nodes.filter(n => n.subject === editingSubject).length;
    const msg = topicCount > 0
        ? 'Delete "' + editingSubject + '"? This will also delete ' + topicCount + ' topic(s) in this subject and their connections.'
        : 'Delete "' + editingSubject + '"?';
    if (!confirm(msg)) return;

    const s = subjects.find(x => x.name === editingSubject);
    const removedNodes = nodes.filter(n => n.subject === editingSubject);
    const removedNodeIds = removedNodes.map(n => n.id);
    const removedConns = connections.filter(c => removedNodeIds.includes(c.from) || removedNodeIds.includes(c.to));

    pushUndo({
        type: 'deleteSubject',
        subject: { ...s },
        nodes: removedNodes.map(n => ({ ...n })),
        connections: removedConns.map(c => ({ ...c }))
    });

    nodes = nodes.filter(n => n.subject !== editingSubject);
    connections = connections.filter(c => !removedNodeIds.includes(c.from) && !removedNodeIds.includes(c.to));
    subjects = subjects.filter(x => x.name !== editingSubject);
    filters.subjects = filters.subjects.filter(f => f !== editingSubject);

    editingSubject = null;
    document.getElementById('editSubjectArea').style.display = 'none';
    if (selectedNodeId && removedNodeIds.includes(selectedNodeId)) cancelEdit();
    save();
    refreshSubjectDropdowns();
    refreshFilters();
    refreshTopicsList();
    render();
}

// ===== FILTER OPERATIONS =====
// Refresh filter UI based on current filters
function refreshFilters() {
  log('INFO', 'Refreshing filters');
  const subChips = document.getElementById('filterSubjectChips');
  subChips.innerHTML = '';
  subjects.forEach(s => {
    const chip = document.createElement('span');
    chip.className = 'filter-chip' + (filters.subjects.includes(s.name) ? ' active' : '');
    chip.textContent = s.name;
    chip.style.borderColor = filters.subjects.includes(s.name) ? s.color : '';
    chip.style.background = filters.subjects.includes(s.name) ? s.color + '33' : '';
    chip.onclick = () => {
      if (filters.subjects.includes(s.name)) filters.subjects = filters.subjects.filter(x => x !== s.name);
      else filters.subjects.push(s.name);
      refreshFilters();
      refreshTopicsList();
      render();
    };
    subChips.appendChild(chip);
  });

  const diffChips = document.getElementById('filterDifficultyChips');
  diffChips.innerHTML = '';
  ['beginner', 'intermediate', 'advanced'].forEach(d => {
    const chip = document.createElement('span');
    chip.className = 'filter-chip' + (filters.difficulties.includes(d) ? ' active' : '');
    chip.textContent = d;
    chip.onclick = () => {
      if (filters.difficulties.includes(d)) filters.difficulties = filters.difficulties.filter(x => x !== d);
      else filters.difficulties.push(d);
      refreshFilters();
      refreshTopicsList();
      render();
    };
    diffChips.appendChild(chip);
  });

  const impChips = document.getElementById('filterImportanceChips');
  impChips.innerHTML = '';
  ['core', 'supplementary', 'optional'].forEach(i => {
    const chip = document.createElement('span');
    chip.className = 'filter-chip' + (filters.importances.includes(i) ? ' active' : '');
    chip.textContent = i;
    chip.onclick = () => {
      if (filters.importances.includes(i)) filters.importances = filters.importances.filter(x => x !== i);
      else filters.importances.push(i);
      refreshFilters();
      refreshTopicsList();
      render();
    };
    impChips.appendChild(chip);
  });
}

// Clear all filters
function clearFilters() {
  log('INFO', 'Clearing all filters');
  filters = { subjects: [], difficulties: [], importances: [] };
  refreshFilters();
  refreshTopicsList();
  render();
}

// ===== TOPICS LIST =====
// Refresh topics list in sidebar based on filters
function refreshTopicsList() {
  log('INFO', 'Refreshing topics list');
  const list = document.getElementById('topicsList');
  list.innerHTML = '';

  const visible = nodes.filter(isNodeVisible);
  document.getElementById('topicCount').textContent = visible.length;

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty-state">No topics match</div>';
    return;
  }

  const grouped = {};
  visible.forEach(n => {
    if (!grouped[n.subject]) grouped[n.subject] = [];
    grouped[n.subject].push(n);
  });

  Object.keys(grouped).sort().forEach(subject => {
    const group = document.createElement('div');
    group.className = 'topic-group';
    const color = getSubjectColor(subject);
    const items = grouped[subject];

    const header = document.createElement('div');
    header.className = 'topic-group-header';
    header.innerHTML = `<span class="group-chevron">&#9660;</span><span class="dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span> ${subject} (${items.length})`;
    header.onclick = () => {
      header.classList.toggle('collapsed');
      itemsDiv.classList.toggle('collapsed');
    };

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'topic-group-items';

    items.sort((a, b) => a.name.localeCompare(b.name)).forEach(n => {
      const item = document.createElement('div');
      item.className = 'topic-item' + (n.id === selectedNodeId ? ' selected' : '');
      const connCount = getConnectionCount(n.id);
      item.innerHTML = `<span class="name">${n.name}</span><span class="conn-count">${connCount} conn.</span>`;
      item.onclick = () => {
        const screen = worldToScreen(n.x, n.y);
        panX += mainCanvas.width / 2 - screen.x;
        panY += mainCanvas.height / 2 - screen.y;
        selectNode(n.id);
        render();
      };
      itemsDiv.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(itemsDiv);
    list.appendChild(group);
  });
}

// ===== STORAGE =====
// Save all data to browser localStorage
function save() {
  log('INFO', 'Saving data to localStorage');
  const data = { nodes, connections, subjects };
  try {
    localStorage.setItem('studyMapData', JSON.stringify(data));
    localStorage.setItem('lastLocalSave', Date.now().toString());
  } catch (e) {
    log('ERROR', 'Save to localStorage failed:', e);
  }
}

// Load all data from browser localStorage
function loadFromStorage() {
  log('INFO', 'Loading data from localStorage');
  try {
    const raw = localStorage.getItem('studyMapData');
    if (!raw) {
      log('INFO', 'No data in localStorage');
      return;
    }
    const data = JSON.parse(raw);
    nodes = data.nodes || [];
    connections = data.connections || [];
    subjects = data.subjects || [];
    log('INFO', 'Data loaded from localStorage successfully');
  } catch (e) {
    log('ERROR', 'Load from localStorage failed:', e);
  }
}

// ===== IMPORT/EXPORT =====
// Export all data as JSON file
function exportJSON() {
  log('INFO', 'Exporting data to JSON');
  const data = {
    exportDate: new Date().toISOString(),
    subjects: subjects,
    nodes: nodes.map(n => ({
      name: n.name,
      subject: n.subject,
      difficulty: n.difficulty,
      importance: n.importance,
      dateLearned: n.dateLearned,
      notes: n.notes,
      position: { x: Math.round(n.x), y: Math.round(n.y) }
    })),
    connections: connections.map(c => {
      const from = nodes.find(n => n.id === c.from);
      const to = nodes.find(n => n.id === c.to);
      return { from: from ? from.name : 'Unknown', to: to ? to.name : 'Unknown' };
    }),
    stats: {
      totalTopics: nodes.length,
      totalConnections: connections.length,
      subjectBreakdown: subjects.map(s => ({
        subject: s.name,
        topicCount: nodes.filter(n => n.subject === s.name).length,
        connectionCount: connections.filter(c => {
          const from = nodes.find(n => n.id === c.from);
          const to = nodes.find(n => n.id === c.to);
          return (from && from.subject === s.name) || (to && to.subject === s.name);
        }).length
      }))
    }
  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'study-map-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Import data from JSON file
function importJSON(event) {
  log('INFO', 'Importing data from JSON');
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.subjects) subjects = data.subjects;
      if (data.nodes) {
        nodes = data.nodes.map(n => ({
          id: generateId(),
          name: n.name,
          subject: n.subject,
          difficulty: n.difficulty,
          importance: n.importance,
          dateLearned: n.dateLearned || '',
          notes: n.notes || '',
          x: n.position ? n.position.x : Math.random() * 600,
          y: n.position ? n.position.y : Math.random() * 400,
        }));
      }
      if (data.connections) {
        connections = [];
        data.connections.forEach(c => {
          const fromNode = nodes.find(n => n.name === c.from);
          const toNode = nodes.find(n => n.name === c.to);
          if (fromNode && toNode) {
            connections.push({ id: generateId(), from: fromNode.id, to: toNode.id });
          }
        });
      }
      save();
      refreshSubjectDropdowns();
      refreshFilters();
      refreshTopicsList();
      resetView();
      log('INFO', 'JSON import successful');
    } catch (err) {
      log('ERROR', 'JSON import failed:', err);
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Clear all data after confirmation
function clearAll() {
  log('INFO', 'Clearing all data');
  if (!confirm('Clear ALL topics, connections and subjects? This cannot be undone (but you can export first).')) return;
  pushUndo({ type: 'clearAll', oldNodes: [...nodes], oldConnections: [...connections], oldSubjects: [...subjects] });
  nodes = [];
  connections = [];
  subjects = [];
  selectedNodeId = null;
  connectFromId = null;
  cancelEdit();
  save();
  refreshSubjectDropdowns();
  refreshFilters();
  refreshTopicsList();
  render();
}

// ===== START APPLICATION =====
init();
